<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="K&amp;P">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151d31" />
      <stop offset="1" stop-color="#06080e" />
    </linearGradient>
    <filter id="glow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="2.1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)" stroke="#26324b" stroke-width="2" />
  <g transform="translate(32 32) rotate(45)" filter="url(#glow)">
    <rect x="-17" y="-17" width="14" height="14" rx="3" fill="#557cff" />
    <rect x="3" y="-17" width="14" height="14" rx="3" fill="#7beaff" />
    <rect x="-17" y="3" width="14" height="14" rx="3" fill="#7beaff" />
    <rect x="3" y="3" width="14" height="14" rx="3" fill="#baff52" />
  </g>
</svg>
